name: CI
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref — claude/** branches fire both
# `push` AND `pull_request` events which otherwise duplicate (and race)
# the same job.  Keep the newer run; cancel the older.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  static-checks:
    # Fast checks that don't need the full Python dep stack. Runs in parallel
    # with `test`. Catches the kinds of drift that unit tests can't see:
    # config.ini.factory ↔ config_schema.py, Lua syntax on the Pixhawk OSD
    # script, shell syntax on deploy/setup scripts.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Config consistency (config.ini.factory ↔ SCHEMA)
        run: python scripts/check_config_consistency.py

      - name: Lua syntax (hydra_osd.lua)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lua5.3
          find scripts -name "*.lua" -print0 | xargs -0 -r -n1 luac5.3 -p

      - name: Shell syntax (shellcheck on scripts/*.sh)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./scripts"
          severity: error

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Match the Jetson runtime: dustynv/l4t-pytorch:r36.4.0 → Ubuntu 22.04 → Python 3.10.
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --no-deps ultralytics supervision
          grep -v "opencv-python\|ultralytics\|supervision" requirements.txt > /tmp/reqs.txt
          pip install -r /tmp/reqs.txt
          pip install opencv-python-headless
          pip install -r requirements-dev.txt

      - name: Lint
        run: |
          make lint
          python scripts/lint_no_duplicate_init_assignments.py hydra_detect/pipeline/facade.py

      - name: Test (with coverage)
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_integration_wiring.py \
            -k "not integration and not slow" \
            --cov=hydra_detect --cov-report=term --cov-report=xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const label = status === 'success' ? 'PASS' : 'FAIL';
            const sha = context.sha.substring(0, 7);
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `CI ${label} — flake8 + pytest fast suite (\`${sha}\`) · [run log](${run})`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  adversarial-required:
    # Soft status check: flags PRs that touch physics/control/safety paths
    # without an attached three-round adversarial report. Not a required
    # check on day one — the team opts in after report quality is trusted.
    # See docs/adversarial/README.md for the path list and the discipline.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect touched adversarial paths
        id: detect
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PATHS=$(cat <<'EOF'
          hydra_detect/pipeline.py
          hydra_detect/pipeline/
          hydra_detect/autonomous.py
          hydra_detect/approach.py
          hydra_detect/guidance.py
          hydra_detect/mavlink_io.py
          hydra_detect/rf/hunt.py
          hydra_detect/rf/navigator.py
          hydra_detect/rf/signal.py
          hydra_detect/servo_tracker.py
          hydra_detect/dogleg_rtl.py
          hydra_detect/geo_tracking.py
          EOF
          )
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          HITS=""
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            MATCH=$(printf '%s\n' "$CHANGED" | grep -F "$p" || true)
            if [ -n "$MATCH" ]; then
              HITS+=$'\n'"$MATCH"
            fi
          done <<< "$PATHS"
          HITS=$(printf '%s\n' "$HITS" | sed '/^$/d' | sort -u || true)
          if [ -n "$HITS" ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            {
              echo 'hits<<HITS_EOF'
              echo "$HITS"
              echo 'HITS_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for adversarial report
        if: steps.detect.outputs.touched == 'true'
        id: report
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          FOUND="false"
          if [ -f "docs/adversarial/${PR_NUMBER}.md" ]; then
            FOUND="true"
            echo "Report committed at docs/adversarial/${PR_NUMBER}.md"
          elif printf '%s' "$PR_BODY" | grep -Eiq 'adversarial[- ]?(report|analysis)|/tmp/reports/adversarial_|docs/adversarial/'; then
            FOUND="true"
            echo "Report referenced in PR body."
          fi
          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

      - name: Report missing (soft fail)
        if: steps.detect.outputs.touched == 'true' && steps.report.outputs.found != 'true'
        run: |
          echo "::warning::This PR touches safety-critical paths without an adversarial report."
          echo "Touched paths:"
          printf '%s\n' "${{ steps.detect.outputs.hits }}"
          echo ""
          echo "Run /adversarial locally and commit the report to docs/adversarial/<PR#>.md,"
          echo "or link the /tmp/reports/adversarial_*.md output in the PR body."
          echo "See docs/adversarial/README.md for the discipline."
          exit 1

      - name: Report present
        if: steps.detect.outputs.touched == 'true' && steps.report.outputs.found == 'true'
        run: echo "Adversarial report detected — PR meets the soft gate."

      - name: No adversarial paths touched
        if: steps.detect.outputs.touched != 'true'
        run: echo "No safety-critical paths touched — adversarial report not required."
