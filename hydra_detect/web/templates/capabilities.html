<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYDRA DETECT -- Capability Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --olive-primary: #385723;
            --olive-dark: #2a4118;
            --ogt-muted: #A6BC92;
            --ogt-warm: #D8E2D0;
            --ogt-light: #EFF5EB;
            --bg-panel: #0a0d10;
            --card-bg: #161616;
            --card-bg-hover: #1a1a1a;
            --border-default: #1a1a1a;
            --border-hover: #2e2e2e;
            --text-primary: #EFF5EB;
            --text-dim: #666;
            --text-data: #d4d4d4;
            --warning: #eab308;
            --danger: #c53030;
            --danger-bg: #2a1010;
            --success: #4a7c2e;
            --info: #93c5fd;
            --font-xs: 10px;
            --font-sm: 11px;
            --font-base: 13px;
            --ls-condensed: 0.08em;
            --radius: 2px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Barlow', sans-serif;
            font-size: var(--font-base);
            background: var(--bg-panel);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Header strip ── */
        .cap-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-default);
            background: #111;
        }
        .cap-header-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: var(--ls-condensed);
            color: var(--ogt-muted);
        }
        .cap-header-sub {
            font-size: var(--font-xs);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            margin-left: auto;
        }
        .cap-header-back {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: var(--font-sm);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: var(--ls-condensed);
            color: var(--text-dim);
            text-decoration: none;
            border: 1px solid var(--border-default);
            padding: 3px 8px;
            border-radius: var(--radius);
        }
        .cap-header-back:hover { color: var(--text-primary); border-color: var(--border-hover); }

        /* ── Capability list ── */
        .cap-list {
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 640px;
        }

        /* ── Capability row ── */
        .cap-row {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            gap: 2px 8px;
            padding: 10px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-default);
            border-radius: var(--radius);
        }
        .cap-row:hover { background: var(--card-bg-hover, #1a1a1a); }

        .cap-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: var(--ls-condensed);
            color: var(--text-primary);
            grid-column: 1;
            grid-row: 1;
        }
        .cap-reasons {
            grid-column: 1;
            grid-row: 2;
            font-size: var(--font-xs);
            color: var(--text-dim);
            line-height: 1.5;
        }
        .cap-reasons:empty { display: none; }

        /* fix link */
        .cap-fix {
            font-size: var(--font-xs);
            color: var(--info);
            text-decoration: none;
            opacity: 0.8;
        }
        .cap-fix:hover { opacity: 1; text-decoration: underline; }

        .cap-pill {
            grid-column: 2;
            grid-row: 1 / 3;
            align-self: center;
            display: inline-flex;
            align-items: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: var(--font-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: var(--ls-condensed);
            padding: 2px 7px;
            border-radius: var(--radius);
            white-space: nowrap;
        }

        /* ── Status pill colors ── */
        .cap-pill-READY   { background: var(--success); color: var(--ogt-light); }
        .cap-pill-WARN    { background: var(--warning); color: #111; }
        .cap-pill-BLOCKED { background: var(--danger); color: #fca5a5; }
        .cap-pill-ARMED   { background: #7c87ee; color: #fff; }
        .cap-pill-dim     { background: #222; color: var(--text-dim); }

        /* ── Status separator between groups ── */
        .cap-section-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: var(--font-xs);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: var(--ls-condensed);
            color: var(--text-dim);
            padding: 8px 4px 2px;
        }

        /* ── Error/loading states ── */
        .cap-loading, .cap-error {
            padding: 16px;
            font-size: var(--font-sm);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }
        .cap-error { color: var(--danger); }
    </style>
</head>
<body>
    <header class="cap-header">
        <a href="/" class="cap-header-back">&#8592; Dashboard</a>
        <span class="cap-header-title">Capability Status</span>
        <span class="cap-header-sub" id="cap-ts">--</span>
    </header>

    <div class="cap-list" id="cap-list" role="list">
        <div class="cap-loading" id="cap-loading">Loading&hellip;</div>
    </div>

    <script src="/static/js/capabilities.js"></script>
</body>
</html>
