<!-- Ops HUD View — full-width video with telemetry + quick actions overlay -->

<!-- Video Container with Canvas Overlay -->
<div class="ops-video-container" id="ops-video-container">
    <img id="ops-video-frame" class="ops-video-frame" alt="Live video feed">
    <canvas id="ops-bbox-canvas" class="ops-bbox-canvas"></canvas>

    <!-- Stream Lost Badge -->
    <div class="ops-hud-stream-lost" id="ops-hud-stream-lost" style="display:none;">
        <span>STREAM LOST</span>
    </div>

    <!-- Lock Info Overlay (shown when target engaged) -->
    <div class="ops-lock-overlay" id="ops-lock-overlay" style="display:none;">
        <span class="ops-lock-icon">&#8853;</span>
        <span class="ops-lock-label" id="ops-lock-label">--</span>
        <span class="ops-lock-mode" id="ops-lock-mode">TRACK</span>
        <span class="ops-lock-elapsed" id="ops-lock-elapsed"></span>
    </div>

    <!-- Telemetry Strip -->
    <div class="ops-telemetry-strip" id="ops-telemetry-strip">
        <div class="ops-telem-item">
            <span class="ops-telem-label">MODE</span>
            <span class="ops-telem-value" id="ops-telem-mode">--</span>
        </div>
        <div class="ops-telem-item">
            <span class="ops-telem-label">BATT</span>
            <span class="ops-telem-value" id="ops-telem-battery">--</span>
        </div>
        <div class="ops-telem-item">
            <span class="ops-telem-label">SPD</span>
            <span class="ops-telem-value" id="ops-telem-speed">--</span>
        </div>
        <div class="ops-telem-item">
            <span class="ops-telem-label">ALT</span>
            <span class="ops-telem-value" id="ops-telem-alt">--</span>
        </div>
        <div class="ops-telem-item">
            <span class="ops-telem-label">HDG</span>
            <span class="ops-telem-value" id="ops-telem-heading">--</span>
        </div>
        <div class="ops-telem-item">
            <span class="ops-telem-label">GPS</span>
            <span class="ops-telem-value" id="ops-telem-gps">--</span>
        </div>
    </div>

    <!-- Quick Action Bar -->
    <div class="ops-quick-actions" id="ops-quick-actions">
        <button class="btn btn-danger ops-action-btn" id="ops-btn-abort" title="Emergency abort">ABORT</button>
        <button class="btn ops-action-btn" id="ops-btn-loiter" title="Hold position">LOITER</button>
        <button class="btn ops-action-btn" id="ops-btn-rtl" title="Return to launch">RTL</button>
    </div>
</div>

<!-- HUD Sidebar (right 40%) -->
<div class="ops-hud-sidebar" id="ops-hud-sidebar">
    <!-- Track Summary -->
    <div class="ops-sidebar-section">
        <div class="ops-sidebar-header">TRACKS</div>
        <div class="ops-track-list" id="ops-track-list">
            <div class="ops-track-empty">No tracks</div>
        </div>
    </div>

    <!-- Approach Status (hidden when approach.mode === idle) -->
    <div class="ops-sidebar-section" id="ops-approach-section" style="display:none;">
        <div class="ops-sidebar-header">APPROACH</div>
        <div class="ops-approach-body">
            <div class="panel-stat-grid panel-stat-grid-3">
                <div class="panel-stat">
                    <span class="panel-stat-label">Mode</span>
                    <span class="panel-stat-value mono accent" id="ops-approach-mode">--</span>
                </div>
                <div class="panel-stat">
                    <span class="panel-stat-label">Elapsed</span>
                    <span class="panel-stat-value mono" id="ops-approach-elapsed">--</span>
                </div>
                <div class="panel-stat">
                    <span class="panel-stat-label">Waypoints</span>
                    <span class="panel-stat-value mono" id="ops-approach-wp">--</span>
                </div>
            </div>
            <div id="ops-approach-arm-status" style="display:none; margin-top:var(--gap-sm);">
                <div class="panel-stat-grid">
                    <div class="panel-stat">
                        <span class="panel-stat-label">SW ARM</span>
                        <span class="panel-stat-value mono" id="ops-approach-sw-arm">SAFE</span>
                    </div>
                    <div class="panel-stat">
                        <span class="panel-stat-label">HW ARM</span>
                        <span class="panel-stat-value mono" id="ops-approach-hw-arm">N/A</span>
                    </div>
                </div>
            </div>
            <div style="margin-top:var(--gap-sm);">
                <button class="btn btn-danger" id="ops-btn-approach-abort" style="width:100%;">Abort Approach</button>
            </div>
        </div>
    </div>

    <!-- Minimap Placeholder -->
    <div class="ops-sidebar-section">
        <div class="ops-sidebar-header">MAP</div>
        <div class="ops-minimap" id="ops-minimap">
            <canvas id="ops-minimap-canvas" width="300" height="200"></canvas>
        </div>
    </div>

    <!-- Vehicle Info -->
    <div class="ops-sidebar-section">
        <div class="ops-sidebar-header">VEHICLE</div>
        <div class="ops-vehicle-info" id="ops-vehicle-info">
            <div class="ops-info-row"><span class="ops-info-label">Mode</span><span class="ops-info-value" id="ops-info-mode">--</span></div>
            <div class="ops-info-row"><span class="ops-info-label">Armed</span><span class="ops-info-value" id="ops-info-armed">--</span></div>
            <div class="ops-info-row"><span class="ops-info-label">Battery</span><span class="ops-info-value" id="ops-info-battery">--</span></div>
            <div class="ops-info-row"><span class="ops-info-label">Position</span><span class="ops-info-value" id="ops-info-position">--</span></div>
        </div>
    </div>
</div>
