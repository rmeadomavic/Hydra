<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hydra Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #e8e8e8; overflow-x: hidden; }

        .header {
            background: #111; padding: 8px 12px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333;
        }
        .header h1 { font-size: 14px; color: #385723; letter-spacing: 2px; }
        .header a { color: #888; text-decoration: none; font-size: 12px; }

        .stream-wrap {
            width: 100%; height: 40vh; background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .stream-wrap img { width: 100%; height: 100%; object-fit: contain; }
        .stream-msg { color: #555; font-size: 13px; position: absolute; }

        .status-bar {
            background: #111; padding: 6px 12px; display: flex; gap: 12px;
            font-size: 11px; color: #888; border-bottom: 1px solid #222;
            flex-wrap: wrap;
        }
        .status-bar .val { color: #A6BC92; }
        .status-bar .warn { color: #c9a227; }

        .tracks { padding: 8px; flex: 1; overflow-y: auto; }
        .tracks-empty { color: #555; font-size: 13px; padding: 20px; text-align: center; }

        .track-card {
            background: #1c1c1c; border: 1px solid #262626; border-radius: 6px;
            padding: 10px 12px; margin-bottom: 8px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .track-card.locked {
            border-color: #385723; background: #1a1f18;
        }
        .track-info { flex: 1; }
        .track-label { font-size: 14px; font-weight: bold; }
        .track-meta { font-size: 11px; color: #888; margin-top: 2px; }
        .track-conf { color: #A6BC92; }

        .track-actions { display: flex; gap: 6px; }

        .btn {
            padding: 10px 16px; border: none; border-radius: 4px;
            font-family: inherit; font-size: 13px; font-weight: bold;
            cursor: pointer; min-height: 44px; min-width: 44px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-lock { background: #385723; color: #fff; }
        .btn-lock:active { background: #2a4118; }
        .btn-strike { background: #8b2020; color: #fff; }
        .btn-strike:active { background: #6b1515; }
        .btn-unlock { background: #333; color: #ccc; }
        .btn-unlock:active { background: #444; }

        .confirm-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 100; align-items: center; justify-content: center; flex-direction: column;
        }
        .confirm-overlay.active { display: flex; }
        .confirm-box {
            background: #1c1c1c; border: 2px solid #8b2020; border-radius: 8px;
            padding: 24px; text-align: center; max-width: 300px;
        }
        .confirm-box h2 { color: #c9a227; font-size: 16px; margin-bottom: 12px; }
        .confirm-box p { color: #aaa; font-size: 13px; margin-bottom: 20px; }
        .confirm-btns { display: flex; gap: 12px; justify-content: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>HYDRA CONTROL</h1>
        <a href="/">Dashboard</a>
    </div>

    <div class="stream-wrap">
        <span class="stream-msg" id="stream-msg">Connecting...</span>
        <img id="stream" alt="Live feed" style="display:none;">
    </div>

    <div class="status-bar" id="status-bar">
        <span>FPS: <span class="val" id="s-fps">--</span></span>
        <span>GPS: <span class="val" id="s-gps">--</span></span>
        <span id="s-armed-wrap" style="display:none">Armed: <span class="warn" id="s-armed">YES</span></span>
        <span>Batt: <span class="val" id="s-batt">--</span></span>
        <span>Tracks: <span class="val" id="s-tracks">0</span></span>
    </div>

    <div class="tracks" id="tracks">
        <div class="tracks-empty">No active tracks</div>
    </div>

    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-box">
            <h2>CONFIRM STRIKE</h2>
            <p>Navigate vehicle toward target <span id="confirm-tid"></span>?</p>
            <div class="confirm-btns">
                <button class="btn btn-strike" id="confirm-yes">STRIKE</button>
                <button class="btn btn-unlock" id="confirm-no">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        var lockedTrackId = null;

        // Stream
        var img = document.getElementById('stream');
        var streamMsg = document.getElementById('stream-msg');
        img.onload = function() { img.style.display = 'block'; streamMsg.style.display = 'none'; };
        img.onerror = function() { img.style.display = 'none'; streamMsg.style.display = 'block'; streamMsg.textContent = 'Stream lost'; };
        img.src = '/stream.mjpeg';

        // API helpers
        function apiGet(url) {
            return fetch(url).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
        }
        function apiPost(url, body) {
            return fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
        }

        // Build a track card using safe DOM methods (no innerHTML)
        function buildTrackCard(t, isLocked) {
            var card = document.createElement('div');
            card.className = 'track-card' + (isLocked ? ' locked' : '');

            var info = document.createElement('div');
            info.className = 'track-info';

            var label = document.createElement('div');
            label.className = 'track-label';
            label.textContent = t.label + ' #' + t.track_id;
            info.appendChild(label);

            var meta = document.createElement('div');
            meta.className = 'track-meta';
            var conf = document.createElement('span');
            conf.className = 'track-conf';
            conf.textContent = (t.confidence * 100).toFixed(0) + '%';
            meta.appendChild(conf);
            info.appendChild(meta);
            card.appendChild(info);

            var actions = document.createElement('div');
            actions.className = 'track-actions';

            if (isLocked) {
                var strikeBtn = document.createElement('button');
                strikeBtn.className = 'btn btn-strike';
                strikeBtn.textContent = 'STRIKE';
                strikeBtn.addEventListener('click', function() { confirmStrike(t.track_id); });
                actions.appendChild(strikeBtn);

                var unlockBtn = document.createElement('button');
                unlockBtn.className = 'btn btn-unlock';
                unlockBtn.textContent = 'UNLOCK';
                unlockBtn.addEventListener('click', doUnlock);
                actions.appendChild(unlockBtn);
            } else {
                var lockBtn = document.createElement('button');
                lockBtn.className = 'btn btn-lock';
                lockBtn.textContent = 'LOCK';
                lockBtn.addEventListener('click', function() { doLock(t.track_id); });
                actions.appendChild(lockBtn);
            }

            card.appendChild(actions);
            return card;
        }

        // Poll and render
        function poll() {
            Promise.all([
                apiGet('/api/tracks'),
                apiGet('/api/target'),
                apiGet('/api/stats'),
            ]).then(function(results) {
                var tracks = results[0];
                var target = results[1];
                var stats = results[2];

                // Status bar
                if (stats) {
                    document.getElementById('s-fps').textContent = (stats.fps || 0).toFixed(1);
                    document.getElementById('s-gps').textContent = stats.position || 'No fix';
                    document.getElementById('s-tracks').textContent = stats.active_tracks || 0;
                    var batt = stats.battery_pct;
                    document.getElementById('s-batt').textContent = batt != null ? batt + '%' : '--';
                    var armedWrap = document.getElementById('s-armed-wrap');
                    armedWrap.style.display = stats.armed ? '' : 'none';
                }

                // Target lock state
                lockedTrackId = (target && target.locked) ? target.track_id : null;

                // Tracks list
                var container = document.getElementById('tracks');
                // Clear existing children safely
                while (container.firstChild) { container.removeChild(container.firstChild); }

                if (!tracks || tracks.length === 0) {
                    var empty = document.createElement('div');
                    empty.className = 'tracks-empty';
                    empty.textContent = 'No active tracks';
                    container.appendChild(empty);
                    return;
                }

                for (var i = 0; i < tracks.length; i++) {
                    var t = tracks[i];
                    container.appendChild(buildTrackCard(t, t.track_id === lockedTrackId));
                }
            });
        }

        function doLock(trackId) {
            apiPost('/api/target/lock', { track_id: trackId }).then(poll);
        }

        function doUnlock() {
            apiPost('/api/target/unlock', {}).then(poll);
        }

        // Strike confirmation
        var pendingStrikeId = null;
        function confirmStrike(trackId) {
            pendingStrikeId = trackId;
            document.getElementById('confirm-tid').textContent = '#' + trackId;
            document.getElementById('confirm-overlay').classList.add('active');
        }
        document.getElementById('confirm-yes').addEventListener('click', function() {
            document.getElementById('confirm-overlay').classList.remove('active');
            if (pendingStrikeId != null) {
                apiPost('/api/target/strike', { track_id: pendingStrikeId, confirm: true }).then(poll);
                pendingStrikeId = null;
            }
        });
        document.getElementById('confirm-no').addEventListener('click', function() {
            document.getElementById('confirm-overlay').classList.remove('active');
            pendingStrikeId = null;
        });

        // Start polling
        poll();
        setInterval(poll, 1500);
    })();
    </script>
</body>
</html>
