; ───────────── Hydra Detect v2.0 Configuration ─────────────
; Edit these values carefully. Restart the service after saving.
; The web UI can also change prompts and thresholds at runtime.

[camera]
; Source: 0 for /dev/video0, RTSP URL, GStreamer pipeline, or file path
source = 0
width = 640
height = 480
fps = 30

[detector]
; Engine: nanoowl or yolo (swappable at config level)
engine = nanoowl

; NanoOWL open-vocabulary settings
nanoowl_model = google/owlvit-base-patch32
nanoowl_prompts = a person, a rifle, a white bus
nanoowl_threshold = 0.25

; YOLO settings (used when engine = yolo)
yolo_model = yolov8n.pt
yolo_confidence = 0.45
yolo_classes =
; Leave yolo_classes empty for all classes, or comma-separated IDs:
; 0=person, 1=bicycle, 2=car, 3=motorbike, 5=bus, 7=truck

[tracker]
track_thresh = 0.5
track_buffer = 30
match_thresh = 0.8

[mavlink]
enabled = true
; Serial device for telemetry radio on USV
connection_string = /dev/ttyACM0
baud = 115200
source_system = 1
; GPS settings
min_gps_fix = 3
; Alert settings
alert_statustext = true
alert_interval_sec = 5.0
severity = 2                ; MAVLink severity (0=Emergency ... 7=Debug)
; Vehicle commands (require operator confirmation from web UI)
auto_loiter_on_detect = false
guided_roi_on_detect = false

[web]
enabled = true
host = 0.0.0.0
port = 8080
mjpeg_quality = 70

[logging]
; Detection log output
log_dir = /data/logs
log_format = jsonl          ; csv or jsonl
; Full-frame image snapshots
save_images = true
image_dir = /data/images
image_quality = 90
; Object crop images
save_crops = false
crop_dir = /data/crops
