[camera]
source_type = auto
source = auto
width = 640
height = 480
fps = 30
hfov_deg = 60.0
video_standard = ntsc

[detector]
yolo_model = yolov8n.pt
yolo_confidence = 0.45
yolo_imgsz = 416
yolo_classes =

[tracker]
track_thresh = 0.5
track_buffer = 30
match_thresh = 0.8

[mavlink]
enabled = true
connection_string = /dev/ttyTHS1
baud = 921600
source_system = 1
min_gps_fix = 3
alert_statustext = true
alert_interval_sec = 5.0
severity = 2
alert_classes = person, car, motorcycle, truck, bus, boat, bicycle, airplane, backpack, suitcase, handbag, cell phone, laptop, dog, horse, knife, scissors, baseball bat, bottle, umbrella
auto_loiter_on_detect = false
guided_roi_on_detect = false
strike_distance_m = 20.0
geo_tracking = true
sim_gps_lat =
sim_gps_lon =

[alerts]
light_bar_enabled = true
light_bar_channel = 4
light_bar_pwm_on = 1900
light_bar_pwm_off = 1100
light_bar_flash_sec = 0.5

[web]
enabled = true
host = 0.0.0.0
port = 8080
mjpeg_quality = 70
api_token = 

[osd]
enabled = false
mode = statustext
update_interval = 2.0
serial_port = /dev/ttyUSB0
serial_baud = 115200
canvas_cols = 50
canvas_rows = 18

[autonomous]
enabled = false
geofence_lat = 0.0
geofence_lon = 0.0
geofence_radius_m = 100.0
geofence_polygon = 
min_confidence = 0.85
min_track_frames = 5
allowed_classes = 
strike_cooldown_sec = 30.0
allowed_vehicle_modes = AUTO

[rf_homing]
enabled = false
mode = wifi
target_bssid = 
target_freq_mhz = 915.0
kismet_host = http://localhost:2501
kismet_user = kismet
kismet_pass = kismet
search_pattern = lawnmower
search_area_m = 100.0
search_spacing_m = 20.0
search_alt_m = 15.0
rssi_threshold_dbm = -80.0
rssi_converge_dbm = -40.0
rssi_window = 10
gradient_step_m = 5.0
gradient_rotation_deg = 45.0
poll_interval_sec = 0.5
arrival_tolerance_m = 3.0
gps_required = true
kismet_source = rtl433-0
kismet_capture_dir = ./output_data/kismet
kismet_max_capture_mb = 100

[servo_tracking]
enabled = false
pan_channel = 1
pan_pwm_center = 1500
pan_pwm_range = 500
pan_invert = false
pan_dead_zone = 0.05
pan_smoothing = 0.3
strike_channel = 2
strike_pwm_fire = 1900
strike_pwm_safe = 1100
strike_duration = 0.5
replaces_yaw = false

[logging]
log_dir = ./output_data/logs
log_format = jsonl
save_images = true
image_dir = ./output_data/images
image_quality = 90
save_crops = false
crop_dir = ./output_data/crops
max_log_size_mb = 10
max_log_files = 20

[rtsp]
enabled = true
port = 8554
mount = /hydra
bitrate = 2000000

[mavlink_video]
enabled = false
width = 160
height = 120
jpeg_quality = 20
max_fps = 2.0
min_fps = 0.2
link_budget_bytes_sec = 8000

