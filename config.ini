[camera]
source_type = auto
source = auto
width = 640
height = 480
fps = 30
hfov_deg = 60.0
video_standard = ntsc

[detector]
yolo_model = yolov8n.pt
yolo_confidence = 0.45
yolo_imgsz = 416
yolo_classes =
low_light_luminance = 40

[tracker]
track_thresh = 0.5
track_buffer = 30
match_thresh = 0.8

[mavlink]
enabled = true
connection_string = /dev/ttyTHS1
baud = 921600
source_system = 1
min_gps_fix = 3
alert_statustext = true
alert_interval_sec = 5.0
severity = 2
alert_classes = person, car, motorcycle, truck, bus, boat, bicycle, airplane, backpack, suitcase, handbag, cell phone, laptop, dog, horse, knife, scissors, baseball bat, bottle, umbrella
auto_loiter_on_detect = false
guided_roi_on_detect = false
strike_distance_m = 20.0
geo_tracking = true
geo_tracking_interval = 2.0
sim_gps_lat =
sim_gps_lon = 

[alerts]
light_bar_enabled = true
light_bar_channel = 4
light_bar_pwm_on = 1900
light_bar_pwm_off = 1100
light_bar_flash_sec = 0.5
global_max_per_sec = 2                   ; max STATUSTEXT alerts/sec across all labels
priority_labels =                        ; comma-separated labels that bypass global cap (e.g. person,vehicle)

[web]
enabled = true
host = 0.0.0.0
port = 8080
mjpeg_quality = 70
api_token =
tls_enabled = false                     ; enable HTTPS with self-signed cert
tls_cert = certs/hydra.crt             ; TLS certificate path
tls_key = certs/hydra.key              ; TLS private key path

[osd]
enabled = true
mode = named_value
update_interval = 2.0
serial_port = /dev/ttyUSB0
serial_baud = 115200
canvas_cols = 50
canvas_rows = 18

[autonomous]
enabled = false
geofence_lat = 0.0
geofence_lon = 0.0
geofence_radius_m = 100.0
geofence_polygon =
min_confidence = 0.85
min_track_frames = 5
allowed_classes =
strike_cooldown_sec = 30.0
allowed_vehicle_modes = AUTO
gps_max_stale_sec = 2.0                 ; abort if GPS data is older than this
require_operator_lock = false            ; require explicit target lock before auto-strike
arm_channel = 0                          ; software arm servo channel (0 = disabled)
arm_pwm_armed = 1900
arm_pwm_safe = 1100
hardware_arm_channel = 0                 ; RC channel for hardware arm switch (0 = disabled)
dogleg_distance_m = 200                 ; offset distance for dogleg RTL (drones)
dogleg_bearing = perpendicular          ; offset bearing (perpendicular or compass degrees)
dogleg_altitude_m = 50                  ; climb altitude before dogleg

[approach]
follow_speed_min = 2.0                   ; m/s — speed when target is at frame edge
follow_speed_max = 10.0                  ; m/s — speed when target is centered
follow_distance_m = 15.0                 ; approach distance for waypoint projection
follow_yaw_rate_max = 30.0               ; deg/s max yaw rate in follow mode
abort_mode = LOITER                      ; vehicle mode on approach abort
waypoint_interval = 0.5                  ; seconds between waypoint updates

[drop]
enabled = false
servo_channel = 0                        ; servo channel for drop mechanism (0 = disabled)
pwm_release = 1900                       ; PWM to release payload
pwm_hold = 1100                          ; PWM to hold payload
pulse_duration = 1.0                     ; seconds to hold release PWM
drop_distance_m = 3.0                    ; release distance from target (metres)

[guidance]
fwd_gain = 2.0                           ; forward velocity gain (m/s per unit approach ratio)
lat_gain = 1.5                           ; lateral velocity gain (m/s per unit error)
vert_gain = 1.0                          ; vertical velocity gain (m/s per unit error)
yaw_gain = 30.0                          ; yaw rate gain (deg/s per unit error)
max_fwd_speed = 5.0                      ; max forward speed (m/s)
max_lat_speed = 2.0                      ; max lateral speed (m/s)
max_vert_speed = 1.5                     ; max vertical speed (m/s)
max_yaw_rate = 45.0                      ; max yaw rate (deg/s)
deadzone = 0.05                          ; ignore errors below this (0..1)
smoothing = 0.4                          ; EMA alpha (0..1, higher = less smoothing)
target_bbox_ratio = 0.15                 ; stop approaching when target fills this fraction of frame
lost_track_timeout_s = 2.0               ; abort after this many seconds with no track
min_altitude_m = 5.0                     ; minimum altitude floor (metres)

[rf_homing]
enabled = false
mode = wifi
target_bssid = 
target_freq_mhz = 915.0
kismet_host = http://localhost:2501
kismet_user = kismet
kismet_pass = kismet
search_pattern = lawnmower
search_area_m = 100.0
search_spacing_m = 20.0
search_alt_m = 15.0
rssi_threshold_dbm = -80.0
rssi_converge_dbm = -40.0
rssi_window = 10
gradient_step_m = 5.0
gradient_rotation_deg = 45.0
poll_interval_sec = 0.5
arrival_tolerance_m = 3.0
gps_required = false
kismet_source = rtl433-0
kismet_capture_dir = ./output_data/kismet
kismet_max_capture_mb = 100
kismet_auto_spawn = false

[servo_tracking]
enabled = false
pan_channel = 1
pan_pwm_center = 1500
pan_pwm_range = 500
pan_invert = false
pan_dead_zone = 0.05
pan_smoothing = 0.3
strike_channel = 2
strike_pwm_fire = 1900
strike_pwm_safe = 1100
strike_duration = 0.5
replaces_yaw = false

[logging]
log_dir = ./output_data/logs
log_format = jsonl
save_images = true
image_dir = ./output_data/images
image_quality = 90
save_crops = false
crop_dir = ./output_data/crops
max_log_size_mb = 10
max_log_files = 20
app_log_file = true
app_log_level = INFO
wipe_on_start = false                   ; clear previous session logs on startup

[watchdog]
max_stall_sec = 30                      ; force-exit if no frame processed in this many seconds

[rtsp]
enabled = true
bind = 127.0.0.1                       ; bind address (127.0.0.1 = local only, 0.0.0.0 = all interfaces)
port = 8554
mount = /hydra
bitrate = 2000000

[mavlink_video]
enabled = false
width = 160
height = 120
jpeg_quality = 20
max_fps = 2.0
min_fps = 0.2
link_budget_bytes_sec = 8000

[tak]
enabled = true
callsign = HYDRA-1
multicast_group = 239.2.3.1
multicast_port = 6969
unicast_targets = 100.78.5.101:4242, 100.64.82.98:4242
emit_interval = 2.0
sa_interval = 5.0
stale_detection = 60.0
stale_sa = 30.0
advertise_host = 100.109.160.122
listen_commands = true
listen_port = 6969
allowed_callsigns =                     ; comma-separated callsigns allowed to send commands (empty = TAK commands disabled)
command_hmac_secret =                   ; optional shared secret for HMAC verification on commands

; ---------------------------------------------------------------------------
; Vehicle profiles — override base sections via --vehicle <name> or HYDRA_VEHICLE
; Keys use "section.option" format to override the matching base section.
; ---------------------------------------------------------------------------

[vehicle.drone]
reserved_channels = 1,2,3,4              ; motor outputs — never use for servos
autonomous.post_drop_mode = DOGLEG_RTL
autonomous.post_strike_mode = LOITER
; camera.source = /dev/video0
; autonomous.abort_action = rtl
; alerts.priority_labels = person,vehicle

[vehicle.usv]
reserved_channels = 1,3                  ; rudder (1) and throttle (3)
autonomous.post_drop_mode = SMART_RTL
autonomous.post_strike_mode = LOITER
; camera.source = /dev/video2
; autonomous.abort_action = hold
; alerts.priority_labels = person,boat,kayak
; tak.callsign = HYDRA-USV

[vehicle.ugv]
reserved_channels = 1,3                  ; steering (1) and throttle (3)
autonomous.post_drop_mode = SMART_RTL
autonomous.post_strike_mode = HOLD
; camera.source = /dev/video0
; autonomous.abort_action = cut_throttle
; alerts.priority_labels = person,vehicle
; tak.callsign = HYDRA-UGV

[vehicle.fw]
autonomous.post_action_mode = LOITER
autonomous.min_track_frames = 2
