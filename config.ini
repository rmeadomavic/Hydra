; ───────────── Hydra Detect v2.0 Configuration ─────────────
; Edit these values carefully. Restart the service after saving.
; The web UI can also change prompts and thresholds at runtime.

[camera]
; Source type: "auto" (default webcam behaviour), "digital" (alias for auto),
; or "analog" (CVBS capture dongle for FPV cameras like Caddx Ratel 2).
; When source_type = analog, Hydra forces the V4L2 backend and configures
; composite input via v4l2-ctl. See docs/analog-camera-setup.md for wiring.
source_type = auto
; Source: "auto" picks the first webcam or capture card, or use device index
; (0, 2, ...), RTSP URL, GStreamer pipeline, or file path.
; HDZero Freestyle V2 is fully digital — no analog tap available on-vehicle.
; Use a USB webcam (C270/C920) as the detection camera alongside HDZero FPV.
source = auto
width = 640
height = 480
fps = 30
hfov_deg = 60.0               ; Camera horizontal field of view (degrees)
; Video standard for analog capture: "ntsc" (default, 720x480), "pal" (720x576),
; or "auto" (let the dongle auto-detect). Only used when source_type = analog.
video_standard = ntsc

; ── Analog FPV camera example (uncomment to use) ──────────────
; source_type = analog
; source = 2                   ; /dev/video2 — run 'ls /dev/video*' to find yours
; width = 720
; height = 480
; fps = 30
; hfov_deg = 120.0             ; FPV cameras with 2.1mm lens are ~120°
; video_standard = ntsc        ; ntsc, pal, or auto

[detector]
; YOLO object detection (YOLOv8)
yolo_model = yolov8s.pt
yolo_confidence = 0.45
yolo_classes =
; Leave yolo_classes empty for all 80 COCO classes, or filter by comma-separated IDs:
; 0=person, 1=bicycle, 2=car, 3=motorbike, 5=bus, 7=truck, 14=bird, 15=cat, 16=dog

[tracker]
track_thresh = 0.5
track_buffer = 30
match_thresh = 0.8

[mavlink]
enabled = true
; Serial device for telemetry radio on USV
connection_string = /dev/ttyTHS1
baud = 921600
source_system = 1
; GPS settings
min_gps_fix = 3
; Alert settings
alert_statustext = true
alert_interval_sec = 5.0
severity = 2                ; MAVLink severity (0=Emergency ... 7=Debug)
alert_classes = person, car, motorcycle, truck, bus, boat, bicycle, airplane, backpack, suitcase, handbag, cell phone, laptop, dog, horse, knife, scissors, baseball bat, bottle, umbrella
; Comma-separated class labels to alert on (empty = all detected classes).
; Labels must match the loaded model. Unknown labels are silently ignored.
; Vehicle commands (require operator confirmation from web UI)
auto_loiter_on_detect = false
guided_roi_on_detect = false
strike_distance_m = 20.0      ; Distance in metres for strike waypoint projection
geo_tracking = true           ; Send CAMERA_TRACKING_GEO_STATUS for GCS map markers

[web]
enabled = true
host = 0.0.0.0
port = 8080
mjpeg_quality = 70
; API token for mutating/control endpoints (leave empty to disable auth)
api_token =

[osd]
; FPV OSD overlay — sends detection data to FC, which forwards to HDZero VTX via MSP.
; Requires MAVLink enabled + a spare FC UART wired to VTX RX pad.
; Works with any ArduPilot FC (including Pixhawk 6C) — no MAX7456 chip needed.
; Set OSD_TYPE=3 and SERIALn_PROTOCOL=33 on the FC. See docs/hdzero-osd-setup.md.
enabled = false
; Mode: 'statustext' (simple, no Lua needed), 'named_value' (richer, needs Lua on FC),
;        or 'msp_displayport' (direct serial to HDZero VTX — bypasses FC entirely).
mode = statustext
; How often to send OSD updates (seconds). Lower = more responsive but more MAVLink traffic.
update_interval = 0.2
; --- MSP DisplayPort settings (only used when mode = msp_displayport) ---
; Serial device connected to HDZero VTX UART (USB-UART adapter on Jetson)
serial_port = /dev/ttyUSB0
serial_baud = 115200
; HD OSD canvas dimensions (HDZero default: 50 cols × 18 rows)
canvas_cols = 50
canvas_rows = 18

[autonomous]
; Autonomous strike — auto-engage targets meeting ALL qualification criteria.
; DISABLED by default. Enable only when you understand the implications.
enabled = false
; Geofence: circle (center + radius). Vehicle must be inside to allow auto-strike.
geofence_lat = 0.0
geofence_lon = 0.0
geofence_radius_m = 100.0
; Geofence: polygon (semicolon-separated lat,lon pairs). Overrides circle if set.
; Example: 34.05,-118.25;34.06,-118.24;34.05,-118.23;34.04,-118.24
geofence_polygon =
; Minimum detection confidence for autonomous strike (0.0-1.0)
min_confidence = 0.85
; Target must be tracked for this many consecutive frames before strike
min_track_frames = 5
; Comma-separated class labels allowed for autonomous strike (empty = all classes)
allowed_classes =
; Seconds to wait between autonomous strikes
strike_cooldown_sec = 30.0
; Vehicle must be in one of these modes (comma-separated) for autonomous strike
allowed_vehicle_modes = AUTO

[rf_homing]
; RF source localization via Kismet + RSSI gradient ascent.
; Requires: Kismet running on the companion computer.
; WiFi mode: monitor-mode WiFi adapter (e.g. Alfa AWUS036ACH)
; SDR mode: NooElec NESDR Smart (R860) + LANA WB via rtl_433
enabled = false
; "wifi" (hunt by BSSID) or "sdr" (hunt by frequency)
mode = wifi
; WiFi target — MAC address of the AP/device to locate
target_bssid =
; SDR target — frequency in MHz (433.92 for ISM, 915 for Crossfire, etc.)
target_freq_mhz = 915.0
; Kismet REST API connection
kismet_host = http://localhost:2501
kismet_user = kismet
kismet_pass = kismet
; Search pattern: "lawnmower" (grid) or "spiral" (expanding from center)
search_pattern = lawnmower
search_area_m = 100.0
search_spacing_m = 20.0
search_alt_m = 15.0
; RSSI thresholds (dBm) — adjust for your hardware and environment
rssi_threshold_dbm = -80.0
rssi_converge_dbm = -40.0
rssi_window = 10
; Gradient ascent step size and rotation
gradient_step_m = 5.0
gradient_rotation_deg = 45.0
; Polling and navigation
poll_interval_sec = 0.5
arrival_tolerance_m = 3.0

[logging]
; Detection log output
log_dir = ./output_data/logs
log_format = jsonl          ; csv or jsonl
; Full-frame image snapshots
save_images = true
image_dir = ./output_data/images
image_quality = 90
; Object crop images
save_crops = false
crop_dir = ./output_data/crops
