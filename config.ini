[camera]
# Source: 0 for /dev/video0, or RTSP URL, or file path
source = 0
width = 640
height = 480
fps = 30

[detector]
# Engine: nanoowl or yolo
engine = yolo
# NanoOWL settings
nanoowl_model = google/owlvit-base-patch32
nanoowl_prompts = person,vehicle,animal
nanoowl_threshold = 0.3
# YOLO settings
yolo_model = yolov8n.pt
yolo_confidence = 0.45
yolo_classes = 0,1,2,3,5,7
# 0=person, 1=bicycle, 2=car, 3=motorbike, 5=bus, 7=truck

[tracker]
track_thresh = 0.5
track_buffer = 30
match_thresh = 0.8

[mavlink]
enabled = true
connection_string = udpin:0.0.0.0:14550
# Alert settings
alert_on_detection = true
alert_statustext = true
alert_interval_sec = 5.0
# Vehicle commands
auto_loiter_on_detect = false
guided_roi_on_detect = false

[web]
enabled = true
host = 0.0.0.0
port = 8080
mjpeg_quality = 70

[logging]
# Detection log output
log_dir = logs
log_format = csv
# csv or json
save_crops = false
crop_dir = crops
