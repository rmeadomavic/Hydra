[system]
; Operating mode — environment the unit is running in.
; Values: SIM | BENCH | OBSERVE | FIELD | ARMED | MAINTENANCE
; Default OBSERVE. ARMED transitions require double-confirmation via API.
mode = OBSERVE

[camera]
source_type = auto
source = auto
width = 640
height = 480
fps = 30
hfov_deg = 60.0
video_standard = ntsc

[detector]
yolo_model = yolov8n.pt
yolo_confidence = 0.45
yolo_imgsz = 416
yolo_classes = 
low_light_luminance = 40

[tracker]
track_thresh = 0.5
track_buffer = 30
match_thresh = 0.8

[mavlink]
enabled = true
connection_string = /dev/ttyACM0
baud = 115200
# connection_string default is the Pixhawk USB primary (if00). For a
# serial-telemetry radio on the Jetson 40-pin header, switch to
# /dev/ttyTHS1 at baud=921600. For UDP/SITL: udp:127.0.0.1:14550.
source_system = 1
min_gps_fix = 3
alert_statustext = true
alert_interval_sec = 5.0
severity = 2
alert_classes = person, car, motorcycle, truck, bus, boat, bicycle, airplane, backpack, suitcase, handbag, cell phone, laptop, knife, scissors, baseball bat, bottle, umbrella
auto_loiter_on_detect = false
guided_roi_on_detect = false
strike_distance_m = 20.0
geo_tracking = true
geo_tracking_interval = 2.0
sim_gps_lat = 
sim_gps_lon = 

[alerts]
light_bar_enabled = true
; Default channel 9 (aux). Channels 1-4 collide with drone reserved
; (roll/pitch/throttle/yaw); pick any aux channel 5-14 for auxiliary gear.
light_bar_channel = 9
light_bar_pwm_on = 1900
light_bar_pwm_off = 1100
light_bar_flash_sec = 0.5
global_max_per_sec = 2
priority_labels = 

[web]
enabled = true
host = 0.0.0.0
port = 8080
mjpeg_quality = 70
api_token =
web_password = 
session_timeout_min = 480
tls_enabled = false
tls_cert = certs/hydra.crt
tls_key = certs/hydra.key
require_auth_for_control = false

[osd]
enabled = true
mode = named_value
update_interval = 2.0
serial_port = /dev/ttyUSB0
serial_baud = 115200
canvas_cols = 50
canvas_rows = 18

[autonomous]
enabled = false
geofence_lat = 0.0
geofence_lon = 0.0
geofence_radius_m = 100.0
geofence_polygon = 
min_confidence = 0.85
min_track_frames = 5
allowed_classes = 
strike_cooldown_sec = 30.0
allowed_vehicle_modes = AUTO
gps_max_stale_sec = 2.0
require_operator_lock = true
arm_channel = 0
arm_pwm_armed = 1900
arm_pwm_safe = 1100
hardware_arm_channel = 0
dogleg_distance_m = 200
dogleg_bearing = perpendicular
dogleg_altitude_m = 50

[approach]
follow_speed_min = 2.0
follow_speed_max = 10.0
follow_distance_m = 15.0
follow_yaw_rate_max = 30.0
strike_approach_m = 5.0
abort_mode = LOITER
waypoint_interval = 0.5

[drop]
servo_channel = 0
pwm_release = 1900
pwm_hold = 1100
pulse_duration = 1.0
drop_distance_m = 3.0

[guidance]
fwd_gain = 2.0
lat_gain = 1.5
vert_gain = 1.0
yaw_gain = 30.0
max_fwd_speed = 5.0
max_lat_speed = 2.0
max_vert_speed = 1.5
max_yaw_rate = 45.0
deadzone = 0.05
smoothing = 0.4
target_bbox_ratio = 0.15
lost_track_timeout_s = 2.0
min_altitude_m = 5.0

[rf_homing]
enabled = false
mode = wifi
target_bssid = 
target_freq_mhz = 915.0
kismet_host = http://localhost:2501
kismet_user = kismet
kismet_pass = kismet
search_pattern = lawnmower
search_area_m = 100.0
search_spacing_m = 20.0
search_alt_m = 15.0
rssi_threshold_dbm = -80.0
rssi_converge_dbm = -40.0
rssi_window = 10
gradient_step_m = 5.0
gradient_rotation_deg = 45.0
poll_interval_sec = 0.5
arrival_tolerance_m = 3.0
gps_required = false
kismet_source = rtl433-0
kismet_capture_dir = ./output_data/kismet
kismet_max_capture_mb = 100
kismet_auto_spawn = false

[servo_tracking]
enabled = false
; Default aux channels (10/11). Channels 1-4 collide with drone reserved
; (roll/pitch/throttle/yaw). The pipeline disables servo tracking if either
; channel lands in the vehicle's reserved_channels set.
pan_channel = 10
pan_pwm_center = 1500
pan_pwm_range = 500
pan_invert = false
pan_dead_zone = 0.05
pan_smoothing = 0.3
strike_channel = 11
strike_pwm_fire = 1900
strike_pwm_safe = 1100
strike_duration = 0.5
replaces_yaw = false

[logging]
log_dir = ./output_data/logs
log_format = jsonl
save_images = true
image_dir = ./output_data/images
image_quality = 90
save_crops = false
crop_dir = ./output_data/crops
max_log_size_mb = 10
max_log_files = 20
app_log_file = true
app_log_level = INFO
wipe_on_start = false

[watchdog]
max_stall_sec = 30

[rtsp]
enabled = true
bind = 127.0.0.1
port = 8554
mount = /hydra
bitrate = 2000000

[mavlink_video]
enabled = false
width = 160
height = 120
jpeg_quality = 20
max_fps = 2.0
min_fps = 0.2
link_budget_bytes_sec = 8000

[tak]
enabled = true
callsign = HYDRA-1
multicast_group = 239.2.3.1
multicast_port = 6969
unicast_targets = 
emit_interval = 2.0
sa_interval = 5.0
stale_detection = 60.0
stale_sa = 30.0
advertise_host = 
listen_commands = true
listen_port = 6969
allowed_callsigns = 
command_hmac_secret = 
; mode = direct  — Jetson publishes CoT over UDP (requires LAN/WiFi to ATAK).
; mode = relay   — Jetson encodes detections as ADSB_VEHICLE over MAVLink;
;                  run tools/hydra_relay.py on the GCS laptop to republish.
; mode = both    — send via both paths. ATAK dedupes by UID, so this gives
;                  graceful degradation when the Jetson loses WiFi.
mode = direct

[vehicle.drone]
reserved_channels = 1,2,3,4
autonomous.post_drop_mode = DOGLEG_RTL
autonomous.post_strike_mode = LOITER

[vehicle.usv]
reserved_channels = 1,3
autonomous.post_drop_mode = SMART_RTL
autonomous.post_strike_mode = LOITER

[vehicle.ugv]
reserved_channels = 1,3
autonomous.post_drop_mode = SMART_RTL
autonomous.post_strike_mode = HOLD

[vehicle.fw]
autonomous.post_action_mode = LOITER
autonomous.min_track_frames = 2

